<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Live Channels</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
    <div id="app">
        <nav class="navbar glass">
            <div class="nav-left">
                <i data-lucide="tv" class="app-icon"></i>
            </div>
            <div class="nav-center">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="Search channels..." data-i18n="searchPlaceholder">
                </div>
            </div>
            <div class="nav-right">
                <div class="notification-bell" id="notificationBtn">
                    <i data-lucide="bell"></i>
                    <span class="badge" id="notifBadge" style="display: none;">0</span>
                </div>
                <div class="settings-menu-btn" id="settingsBtn">
                    <i data-lucide="settings"></i>
                </div>
            </div>
        </nav>

        <div id="settingsPanel" class="settings-panel glass hidden">
            <h3 data-i18n="settings">Settings</h3>
            <div class="setting-group">
                <label data-i18n="language">Language</label>
                <select id="languageSelect" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="ku">Kurdish</option>
                    <option value="ar">Arabic</option>
                    <option value="fa">Persian</option>
                    <option value="tr">Turkish</option>
                </select>
            </div>
            <div class="setting-group">
                <label data-i18n="theme">Theme</label>
                <button id="themeToggle" class="btn-gold" onclick="toggleTheme()">Toggle Light/Dark</button>
            </div>
            <div class="setting-group">
                <label data-i18n="adminInfo">Developer Info</label>
                <div class="dev-info">
                    </div>
            </div>
            <a href="admin.html" class="btn-gold block-btn" style="text-align:center; margin-top:10px; display:block; text-decoration:none;" data-i18n="adminPanel">Admin Panel</a>
        </div>

        <div id="notificationsPanel" class="notifications-panel glass hidden">
            <h3 data-i18n="notifications">Notifications</h3>
            <div id="notificationsList"></div>
        </div>

        <main class="main-content">
            <div class="slider-container">
                <div class="slider" id="slider"></div>
            </div>

            <div class="categories-wrapper">
                <div class="categories-scroll" id="categoriesList"></div>
            </div>

            <div class="ads-section glass" id="adsSection" style="display: none;">
                <p data-i18n="advertisement">Advertisement</p>
            </div>

            <div class="channels-grid" id="channelsGrid"></div>
        </main>

        <div class="bottom-nav glass">
            <div class="nav-item active" data-tab="home">
                <i data-lucide="home"></i>
                <span data-i18n="home">Home</span>
            </div>
            <div class="nav-item" data-tab="favorites">
                <i data-lucide="heart"></i>
                <span data-i18n="favorites">Favorites</span>
            </div>
            <div class="nav-item" data-tab="tvmode">
                <i data-lucide="monitor-play"></i>
                <span data-i18n="tvMode">TV Mode</span>
            </div>
        </div>

        <div id="tvModeModal" class="tv-mode-modal hidden">
            <div class="player-header glass">
                <button id="closePlayerBtn" class="icon-btn" onclick="closePlayer()"><i data-lucide="arrow-left"></i></button>
                <h2 id="playerTitle">Channel Name</h2>
                <button id="fullscreenBtn" class="icon-btn"><i data-lucide="maximize"></i></button>
            </div>
            <div class="video-container">
                <video id="videoPlayer" controls autoplay></video>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
