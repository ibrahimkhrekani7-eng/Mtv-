<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Master</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <nav class="navbar glass" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; position: sticky; top: 0; z-index: 100;">
        <div class="nav-left">
            <i data-lucide="tv" class="app-icon" style="color: var(--gold, gold); width: 28px; height: 28px;"></i>
        </div>
        
        <div class="nav-center" style="flex: 1; max-width: 500px; margin: 0 20px;">
            <div class="search-bar" style="position: relative; display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 15px;">
                <i data-lucide="search" style="color: #aaa; width: 18px; height: 18px; margin-right: 10px;"></i>
                <input type="text" id="searchInput" placeholder="Search channels..." data-i18n="searchPlaceholder" style="background: transparent; border: none; color: white; width: 100%; outline: none; font-family: inherit;">
            </div>
        </div>
        
        <div class="nav-right" style="display: flex; align-items: center; gap: 20px;">
            <div class="notification-bell" id="notifBtn" style="cursor: pointer; position: relative;">
                <i data-lucide="bell" style="color: white; width: 24px; height: 24px;"></i>
                <span class="badge" id="notifBadge" style="display: none; position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold;">0</span>
            </div>
            <div class="settings-menu-btn" id="settingsBtn" style="cursor: pointer;">
                <i data-lucide="settings" style="color: white; width: 24px; height: 24px;"></i>
            </div>
        </div>
    </nav>

    <div id="settingsPanel" class="settings-panel glass hidden" style="position: absolute; top: 70px; right: 20px; width: 280px; padding: 20px; border-radius: 12px; z-index: 110; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
        <h3 class="gold-text mb-2" data-i18n="settings" style="color: var(--gold, gold); margin-bottom: 15px; font-size: 1.2rem;">Settings</h3>
        
        <div class="setting-group" style="margin-bottom: 15px;">
            <label data-i18n="language" style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc;">Language</label>
            <select id="languageSelect" onchange="changeLanguage(this.value)" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); outline: none;">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="ku">Kurdish</option>
                <option value="fa">فارسی</option>
                <option value="tr">Türkçe</option>
            </select>
        </div>
        
        <div class="setting-group" style="margin-bottom: 15px;">
            <label data-i18n="theme" style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc;">Theme</label>
            <button id="themeToggle" onclick="toggleTheme()" class="btn-outline" style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: transparent; border: 1px solid var(--gold, gold); color: white; border-radius: 8px; cursor: pointer; transition: 0.3s;">
                <span data-i18n="theme">Toggle Theme</span>
                <i data-lucide="moon" style="width: 18px; height: 18px;"></i>
            </button>
        </div>
        
        <div class="setting-group" style="margin-bottom: 20px;">
            <label data-i18n="adminInfo" style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc;">Developer Info</label>
            <div class="dev-info" style="font-size: 0.85rem; color: #aaa; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                </div>
        </div>

        <div class="setting-group">
            <a href="admin.html" class="btn-gold" style="display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%; padding: 12px; background: var(--gold, gold); color: black; text-decoration: none; border-radius: 8px; font-weight: 600; box-sizing: border-box;">
                <i data-lucide="shield" style="width: 18px; height: 18px;"></i> <span data-i18n="adminPanel">Admin Panel</span>
            </a>
        </div>
    </div>

    <div id="notificationsPanel" class="notifications-panel glass hidden" style="position: absolute; top: 70px; right: 80px; width: 320px; max-height: 400px; padding: 20px; border-radius: 12px; z-index: 110; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); overflow-y: auto;">
        <h3 class="gold-text" data-i18n="notifications" style="color: var(--gold, gold); margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Notifications</h3>
        <div id="notificationsList" style="display: flex; flex-direction: column; gap: 0;">
            </div>
    </div>

    <main id="app" class="main-content" style="padding-bottom: 90px;">
        
        <div class="slider-container glass" style="margin: 20px; overflow: hidden; border-radius: 16px; position: relative; height: 200px; border: 1px solid rgba(255,255,255,0.05);">
            <div class="slider" id="slider" style="display: flex; height: 100%; transition: transform 0.5s ease-in-out;">
                </div>
        </div>

        <div class="categories-wrapper" style="margin: 0 20px 20px 20px;">
            <div class="categories-scroll" id="categoriesList" style="display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;">
                </div>
        </div>

        <div class="channels-grid" id="channelsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; padding: 0 20px;">
            </div>

    </main>

    <nav class="bottom-nav glass" style="position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; background: rgba(15, 23, 42, 0.9); border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 90;">
        <div class="nav-item active" data-tab="home" style="display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; color: var(--gold, gold);">
            <i data-lucide="home" style="width: 22px; height: 22px;"></i>
            <span data-i18n="home" style="font-size: 0.75rem; font-weight: 500;">Home</span>
        </div>
        <div class="nav-item" data-tab="favorites" style="display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; color: #888; transition: 0.3s;">
            <i data-lucide="heart" style="width: 22px; height: 22px;"></i>
            <span data-i18n="favorites" style="font-size: 0.75rem; font-weight: 500;">Favorites</span>
        </div>
        <div class="nav-item" data-tab="tvmode" style="display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; color: #888; transition: 0.3s;">
            <i data-lucide="monitor-play" style="width: 22px; height: 22px;"></i>
            <span data-i18n="tvMode" style="font-size: 0.75rem; font-weight: 500;">TV Mode</span>
        </div>
    </nav>

    <div id="tvModeModal" class="tv-mode-modal hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: none;">
        
        <div class="tv-mode-container" id="tvModeContainer" style="display: flex; width: 100%; height: 100%; position: relative;">
            
            <div class="tv-video-wrapper" style="flex: 1; position: relative; background: #000; display: flex; flex-direction: column;">
                
                <video id="videoPlayer" controls style="width: 100%; height: 100%; object-fit: contain; background: #000;"></video>
                
                <button id="closePlayerBtn" onclick="closePlayer()" class="icon-btn" style="position: absolute; top: 25px; left: 25px; z-index: 60; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;">
                    <i data-lucide="arrow-left"></i>
                </button>
                
                <div class="tv-channels-overlay tv-ui-hidden" id="tvChannelsOverlay" style="position: absolute; bottom: 0; left: 0; width: 100%; display: flex; gap: 15px; padding: 30px 20px; overflow-x: auto; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); z-index: 50; transition: opacity 0.4s ease; scrollbar-width: none;">
                    </div>
            </div>

            <div class="tv-categories-sidebar glass" id="tvCategoriesSidebar" style="width: 260px; min-width: 260px; background: rgba(15, 23, 42, 0.98); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; z-index: 60; box-shadow: -5px 0 25px rgba(0,0,0,0.5);">
                <div style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <h3 style="color: var(--gold, gold); margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
                        <i data-lucide="list-video"></i> Categories
                    </h3>
                </div>
                
                <div id="tvCategoriesList" style="padding: 15px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--gold, gold) transparent;">
                    </div>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('settingsBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('hidden');
            document.getElementById('notificationsPanel').classList.add('hidden');
        });

        // Close panels when clicking outside
        document.addEventListener('click', function(e) {
            const settingsPanel = document.getElementById('settingsPanel');
            const notifPanel = document.getElementById('notificationsPanel');
            
            if (!settingsPanel.classList.contains('hidden') && !settingsPanel.contains(e.target) && !document.getElementById('settingsBtn').contains(e.target)) {
                settingsPanel.classList.add('hidden');
            }
            if (!notifPanel.classList.contains('hidden') && !notifPanel.contains(e.target) && !document.getElementById('notifBtn').contains(e.target)) {
                notifPanel.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
